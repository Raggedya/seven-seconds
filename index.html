<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seven Seconds</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="game-screen">

    <section class="question-card">
      <div id="questionText" class="question-text">
        Press Next Question to begin.
      </div>

      <div class="timer-wrap">
        <div id="timerRing" class="timer-ring">
          <div class="timer-inner">
            <div id="timerNumber" class="timer-number">7</div>
            <div class="timer-label">SECONDS</div>
          </div>
        </div>
      </div>
    </section>

    <section class="buttons">
      <button id="startButton" class="main-button">
        ▶ Start Timer
      </button>

      <button id="nextButton" class="secondary-button">
        Next Question ›
      </button>

      <button id="shareButton" class="share-button">
        ⤴ Share
      </button>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
